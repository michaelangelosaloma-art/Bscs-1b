<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag Racing JS Playground</title>
<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:radial-gradient(circle at top, rgba(255,204,0,0.08), transparent 30%),linear-gradient(180deg,#050608 0%,#0b0d10 50%,#000 100%);
    color:#fff7d1;
    overflow-x:hidden;
}
body:before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,0.03) 0 2px,transparent 2px 120px);
    animation:roadMove 8s linear infinite;
    pointer-events:none;
    opacity:0.3;
}
@keyframes roadMove{from{transform:translateX(0)}to{transform:translateX(-120px)}}
h1{
    text-align:center;
    color:#ffcc00;
    font-family:Impact,sans-serif;
    text-transform:uppercase;
    letter-spacing:3px;
    text-shadow:0 0 10px #ffcc00,0 0 20px #b30000;
}
h2{margin-top:35px;color:#ffcc00}
button{
    padding:8px 14px;
    margin:5px;
    border:2px solid #ffcc00;
    border-radius:25px;
    cursor:pointer;
    background:linear-gradient(45deg, #b30000, #0b3d91, #111);
    color:white;
    transition:0.15s;
    box-shadow:0 0 10px rgba(255,204,0,0.2);
}
button:hover{transform:scale(1.06);filter:brightness(1.1)}
button:active{transform:scale(0.95);box-shadow:0 0 22px #ffcc00}
input{
    padding:8px;
    margin:5px;
    border-radius:10px;
    border:1px solid #ffcc00;
    background:#111;
    color:#fff7d1;
}
.out{
    margin:10px 0;
    padding:10px;
    background:rgba(255,255,255,0.07);
    border-radius:10px;
    font-family:monospace;
    border:1px solid rgba(255,204,0,0.35);
}
ul{padding-left:20px}
p{margin:8px 0}
a.back{
    display:inline-block;
    margin-top:20px;
    padding:10px 16px;
    background:#ffcc00;
    color:#111;
    text-decoration:none;
    border-radius:20px;
    font-weight:bold;
}
</style>
</head>
<body>
<h1>Drag Racing JS Playground</h1>
<h2>Alert</h2>
<button onclick="handleClick(event); alert('Random alert fired!')">Click Me</button>
<h2>Change Text</h2>
<p id="txt">Original text here</p>
<button onclick="handleClick(event); changeText()">Change</button>
<h2>Counter</h2>
<p>Clicks: <span id="count">0</span></p>
<button onclick="handleClick(event); addCount()">+1</button>
<h2>Name Input</h2>
<input id="name" placeholder="Enter name">
<button onclick="handleClick(event); sayHello()">Go</button>
<div class="out" id="helloBox"></div>
<h2>Age Check</h2>
<input id="age" type="number" placeholder="Age">
<button onclick="handleClick(event); checkAge()">Check</button>
<div class="out" id="ageBox"></div>
<h2>Math Zone</h2>
<input id="a" type="number" placeholder="A">
<input id="b" type="number" placeholder="B">
<button onclick="handleClick(event); add()">Add</button>
<button onclick="handleClick(event); sub()">Minus</button>
<button onclick="handleClick(event); mul()">Times</button>
<div class="out" id="math">Result...</div>
<h2>Light Toggle</h2>
<div id="lamp" style="padding:15px;border-radius:10px;background:#555;color:white;">OFF</div>
<button onclick="handleClick(event); toggle()">Switch</button>
<h2>Loop Generator</h2>
<button onclick="handleClick(event); loop()">Generate</button>
<button onclick="handleClick(event); clearList()">Clear</button>
<ul id="list"></ul>
<h2>Final Mix</h2>
<button onclick="handleClick(event); showVars()">Variables</button>
<button onclick="handleClick(event); calc()">Math</button>
<input id="score" type="number" placeholder="Score">
<button onclick="handleClick(event); grade()">Grade</button>
<button onclick="handleClick(event); promptName()">Prompt</button>
<div class="out" id="final"></div>
<a class="back" href="index.html" onclick="handleClick(event)">Back</a>
<script>
let count = 0;
let lamp = false;
let audioCtx;
function beep(frequency, duration, type, gainValue){
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = type;
    oscillator.frequency.value = frequency;
    gainNode.gain.value = gainValue;
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration / 1000);
}
function handleClick(e){
    const el = e.currentTarget;
    el.style.transform = "scale(0.95)";
    el.style.boxShadow = "0 0 22px #ffcc00";
    setTimeout(()=>{el.style.transform="";el.style.boxShadow="";},180);
    beep(760,70,'square',0.03);
}
function changeText(){ document.getElementById("txt").innerHTML = "Changed at " + new Date().toLocaleTimeString(); beep(520,100,'triangle',0.02); }
function addCount(){ count++; document.getElementById("count").innerHTML = count; }
function sayHello(){ let n = document.getElementById("name").value || "Guest"; document.getElementById("helloBox").innerHTML = "Hi " + n; }
function checkAge(){ let a = Number(document.getElementById("age").value); document.getElementById("ageBox").innerHTML = a >= 18 ? "Adult" : "Minor"; }
function get(){ return [Number(document.getElementById("a").value || 0), Number(document.getElementById("b").value || 0)]; }
function add(){ let [x,y] = get(); document.getElementById("math").innerHTML = `${x} + ${y} = ${x+y}`; }
function sub(){ let [x,y] = get(); document.getElementById("math").innerHTML = `${x} - ${y} = ${x-y}`; }
function mul(){ let [x,y] = get(); document.getElementById("math").innerHTML = `${x} × ${y} = ${x*y}`; }
function toggle(){ lamp = !lamp; let box = document.getElementById("lamp"); box.innerHTML = lamp ? "ON" : "OFF"; box.style.background = lamp ? "#00c853" : "#555"; }
function loop(){ let list = document.getElementById("list"); list.innerHTML = ""; for(let i=1;i<=5;i++) list.innerHTML += `<li>Random ${i}</li>`; }
function clearList(){ document.getElementById("list").innerHTML = ""; }
function showVars(){ let x = 9; const name = "Drag JS"; document.getElementById("final").innerHTML = `let=${x} | const=${name}`; }
function calc(){ let a=6,b=3; document.getElementById("final").innerHTML = `+ ${a+b} | - ${a-b}`; }
function grade(){ let s = Number(document.getElementById("score").value); let g = s>=90?"A":s>=80?"B":s>=70?"C":s>=60?"D":"F"; document.getElementById("final").innerHTML = "Grade: " + g; }
function promptName(){ let n = prompt("Enter name:"); if(n) document.getElementById("final").innerHTML = "Hello " + n; }
</script>
</body>
</html>
