<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Racing Carousel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top, rgba(255,204,0,0.08), transparent 30%),linear-gradient(180deg,#050608 0%,#0b0d10 50%,#000 100%);
    color:#fff7d1;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
body:before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,0.03) 0 2px,transparent 2px 120px);
    animation:roadMove 8s linear infinite;
    pointer-events:none;
    opacity:0.3;
}
@keyframes roadMove{from{transform:translateX(0)}to{transform:translateX(-120px)}}
.card{
    width:90%;
    max-width:750px;
    background:linear-gradient(180deg,rgba(15,15,15,0.95),rgba(5,5,5,0.95));
    padding:2rem;
    border-radius:2rem;
    box-shadow:0 0 30px #ffcc00;
    text-align:center;
    border:2px solid #ffcc00;
    position:relative;
    z-index:1;
}
h2{
    margin-bottom:1rem;
    color:#ffcc00;
    font-family:Impact,sans-serif;
    text-transform:uppercase;
    letter-spacing:2px;
    text-shadow:0 0 10px #ffcc00;
}
.car-line{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:0 auto 1rem;
    animation:moveCar 3s ease-in-out infinite alternate;
}
@keyframes moveCar{from{transform:translateX(-10px)}to{transform:translateX(10px)}}
.car-mini{
    width:70px;height:34px;background:linear-gradient(135deg,#ff1a1a,#0b3d91);border-radius:18px 28px 10px 10px;position:relative;box-shadow:0 0 10px rgba(255,204,0,0.5)
}
.car-mini:before,.car-mini:after{
    content:"";position:absolute;bottom:-8px;width:14px;height:14px;border:3px solid #ffcc00;border-radius:50%;background:#111
}
.car-mini:before{left:10px}
.car-mini:after{right:10px}
.carousel{
    display:flex;
    overflow-x:auto;
    gap:1rem;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    scrollbar-width:none;
    padding-bottom:1rem;
}
.carousel::-webkit-scrollbar{display:none}
.carousel-item{
    flex:0 0 auto;
    width:260px;
    height:170px;
    border-radius:1rem;
    overflow:hidden;
    scroll-snap-align:center;
    box-shadow:0 0 14px #ffcc00;
    border:3px solid #ffcc00;
}
.carousel-item img{width:100%;height:100%;object-fit:cover}
.buttons{margin-top:1rem;display:flex;flex-wrap:wrap;justify-content:center;gap:.6rem}
.buttons button{
    background:linear-gradient(180deg,#0b3d91,#111);
    color:#ffcc00;
    border:2px solid #ffcc00;
    padding:.6rem 1rem;
    border-radius:2rem;
    cursor:pointer;
    font-weight:bold;
}
.buttons button:active,.back-btn:active{transform:scale(0.95);box-shadow:0 0 22px #ffcc00}
.back-btn{
    display:inline-block;
    margin-top:1rem;
    padding:.6rem 1rem;
    text-decoration:none;
    color:#111;
    background:#ffcc00;
    border-radius:2rem;
    font-weight:bold;
    border:2px solid #fff7d1;
}
</style>
</head>
<body>
<div class="card">
    <h2>Drag Racing Carousel</h2>
    <div class="car-line">
        <div class="car-mini"></div>
        <div class="car-mini"></div>
        <div class="car-mini"></div>
    </div>
    <div class="carousel" id="carousel">
        <div class="carousel-item"><img src="image/a" alt=""></div>
        <div class="carousel-item"><img src="image/b" alt=""></div>
        <div class="carousel-item"><img src="image/c" alt=""></div>
        <div class="carousel-item"><img src="image/d" alt=""></div>
        <div class="carousel-item"><img src="image/e" alt=""></div>
        <div class="carousel-item"><img src="image/f" alt=""></div>
    </div>
    <div class="buttons">
        <button onclick="handleClick(event); goTo(0)">car 1</button>
        <button onclick="handleClick(event); goTo(1)">car 2</button>
        <button onclick="handleClick(event); goTo(2)">car 3</button>
        <button onclick="handleClick(event); goTo(3)">car 4</button>
        <button onclick="handleClick(event); goTo(4)">car 5</button>
        <button onclick="handleClick(event); goTo(5)">car 6</button>
    </div>
    <a class="back-btn" href="index.html" onclick="handleClick(event)">Back</a>
</div>
<script>
const carousel = document.getElementById("carousel");
const items = document.querySelectorAll(".carousel-item");
let audioCtx;
function beep(frequency, duration, type, gainValue){
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = type;
    oscillator.frequency.value = frequency;
    gainNode.gain.value = gainValue;
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration / 1000);
}
function handleClick(e){
    const el = e.currentTarget;
    el.style.transform = "scale(0.95)";
    el.style.boxShadow = "0 0 22px #ffcc00";
    setTimeout(()=>{el.style.transform="";el.style.boxShadow="";},180);
    beep(760,70,'square',0.03);
}
function goTo(index) {
    items[index].scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
    beep(520,100,'triangle',0.02);
}
</script>
</body>
</html>
